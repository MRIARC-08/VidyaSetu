  <text x="104" y="248" font-family="Georgia, serif" font-size="24" font-weight="600" fill="#161616">Which gas do plants release</text>
  <text x="104" y="280" font-family="Georgia, serif" font-size="24" font-weight="600" fill="#161616">during photosynthesis?</text>

  <!-- Option 1 -->
  <rect x="104" y="316" width="392" height="56" rx="10" fill="#FFFFFF" stroke="#E5E5E0" stroke-width="1.5"/>
  <circle cx="132" cy="344" r="10" fill="none" stroke="#C7C7C2" stroke-width="2"/>
  <text x="156" y="350" font-family="Arial, sans-serif" font-size="16" fill="#3A3A38">Carbon Dioxide</text>

  <!-- Option 2 - selected/correct -->
  <rect x="104" y="384" width="392" height="56" rx="10" fill="#0D9488" fill-opacity="0.10" stroke="#0D9488" stroke-width="2"/>
  <circle cx="132" cy="412" r="10" fill="#0D9488"/>
